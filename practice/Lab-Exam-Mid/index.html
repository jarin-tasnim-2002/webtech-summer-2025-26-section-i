<!DOCTYPE html>
<html>

<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>

    <div class="container">

        <h2 align="center">Student Registration Form</h2>

        <form onsubmit="return validation();">

            <table>

                <tr>
                    <td><label>First Name <span>*</span></label></td>
                    <td><input type="text" id="fname"></td>
                    <td><p id="fnameErr" class="error"></p></td>
                </tr>

                <tr>
                    <td><label>Last Name <span>*</span></label></td>
                    <td><input type="text" id="lname"></td>
                    <td><p id="lnameErr" class="error"></p></td>
                </tr>

                <tr>
                    <td><label>Student ID <span>*</span></label></td>
                    <td><input type="text" id="studentid"></td>
                    <td><p id="idErr" class="error"></p></td>
                </tr>

                <tr>
                    <td><label>Email <span>*</span></label></td>
                    <td><input type="text" id="email"></td>
                    <td><p id="emailErr" class="error"></p></td>
                </tr>

                <tr>
                    <td><label>Credit Completed <span>*</span></label></td>
                    <td><input type="number" id="credit"></td>
                    <td><p id="creditErr" class="error"></p></td>
                </tr>

                <tr>
                    <td><label>Department <span>*</span></label></td>
                    <td>
                        <select id="department">
                            <option value="">Select</option>
                            <option>CSE</option>
                            <option>EEE</option>
                            <option>BBA</option>
                            <option>Architecture</option>
                        </select>
                    </td>
                    <td><p id="deptErr" class="error"></p></td>
                </tr>

                <tr>
                    <td colspan="3" align="center">
                        <input type="submit" value="Register" id="button">
                    </td>
                </tr>

            </table>

        </form>

    </div>

    <br><br>

    <h2 align="center">Registered Student List</h2>

    <table border="1" align="center" cellpadding="8" id="studentTable">

        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Student ID</th>
            <th>Email</th>
            <th>Credit</th>
            <th>Department</th>
        </tr>

    </table>

</body>

</html>
